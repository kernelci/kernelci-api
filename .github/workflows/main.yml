# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the
  # main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-22.04
    name: tests

    strategy:
      matrix:
        python-version: ['3.11']

    steps:

      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Python packages
        working-directory: docker/api
        run: |
          python --version
          python -m pip install --upgrade pip==26.0.1
          pip install -r requirements-dev.txt

      - name: Export environment variables
        run: |
          echo "SECRET_KEY=b6451545d2e4635148d768f07877aade3ad8e7e160d52962badd7587a4b9a150" > .env
          echo "SMTP_HOST=smtp.gmail.com" >> .env
          echo "SMTP_PORT=465" >> .env
          echo "EMAIL_SENDER=test@kernelci.org" >> .env
          echo "EMAIL_PASSWORD=random" >> .env

      - name: Install necessary packages
        run: |
          export DEBIAN_FRONTEND=noninteractive
          sudo apt-get update
          sudo apt install apt-transport-https ca-certificates curl software-properties-common -y
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg | sudo apt-key add -          
          sudo add-apt-repository "deb [arch=amd64] https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable"
          sudo apt-get update
          sudo apt install docker-ce docker-ce-cli containerd.io -y

      - name: Build docker images
        run: docker compose -f test-docker-compose.yaml build --no-cache

      - name: Run API containers
        run: |
          docker compose -f test-docker-compose.yaml up -d test

      - name: Stop docker containers
        if: always()
        run: |
          docker compose -f test-docker-compose.yaml down

  lint:
    runs-on: ubuntu-latest
    name: Lint

    steps:
      - name: Check out source code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.10'

      - name: Install pre-commit
        run: pip install pre-commit==4.6.0

      - name: Run pre-commit hooks
        run: pre-commit run --all-files --show-diff-on-failure
